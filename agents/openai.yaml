interface:
  display_name: "Simulink Power Electronics"
  short_description: "Inspect, debug, lay out, and validate Simulink PE models."
  default_prompt: "Use $simulink-power-electronics to classify the model, inspect topology and control paths, diagnose signal or layout issues, make scoped fixes, and report validation evidence."

dependencies:
